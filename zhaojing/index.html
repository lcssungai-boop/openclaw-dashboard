<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>兆鯨 · 企業管理備忘</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ═══ TOKENS (Japanese minimal) ═══════════════════════════════ */
    :root{
      --bg:#F2F1EE;
      --paper:#FDFCFA;
      --l1:#E4E2DC;
      --l2:#C8C5BC;
      --l3:#9B9890;
      --ink:#3a3a36;
      --ink2:#4A4840;
      --ink3:#88857D;

      --mono:'DM Mono', monospace;
      --body:'Noto Sans TC', sans-serif;
      --rad:8px;

      /* only when truly urgent */
      --urgent:#3a3a36;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:var(--body);
      font-size:14px;
      line-height:1.65;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
      padding-bottom:72px;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none}

    /* pages */
    .page{display:none;animation:fu .18s ease}
    .page.active{display:block}
    @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* hero (no grain) */
    .hero{
      background:var(--ink);
      color:#fff;
      padding:26px 20px 22px;
    }
    .hero-eyebrow{
      font-size:10px;
      font-family:var(--mono);
      opacity:.45;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:10px;
    }
    .hero-date{
      font-size:15px;
      font-family:var(--mono);
      opacity:.65;
      letter-spacing:.08em;
      line-height:1.3;
    }

    /* section */
    .sec{padding:0 20px;margin:22px 0}
    .sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .sec-l{
      font-size:10px;
      font-family:var(--mono);
      color:var(--l3);
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .sec-r{font-size:10px;font-family:var(--mono);color:var(--l3);cursor:pointer}

    /* card */
    .card{
      background:var(--paper);
      border:1px solid var(--l1);
      border-radius:var(--rad);
      padding:13px 15px;
      display:flex;
      gap:11px;
      align-items:flex-start;
      transition:border-color .12s;
    }
    .card:hover{border-color:var(--l2)}

    .c-bar{width:2px;align-self:stretch;min-height:32px;border-radius:2px;flex-shrink:0;background:var(--l2)}
    .c-bar.urgent{background:var(--urgent)}

    .c-body{flex:1;min-width:0}
    .c-title{font-size:15px;font-weight:600;line-height:1.35}
    .c-meta{font-size:10px;font-family:var(--mono);color:var(--l3);margin-top:6px}
    .c-desc{font-size:12px;color:var(--ink2);margin-top:8px;line-height:1.55}

    /* quote block (minimal) */
    .quote{
      background:var(--paper);
      border:1px solid var(--l1);
      border-radius:var(--rad);
      padding:14px 16px;
      border-left:2px solid var(--ink);
    }
    .quote-text{font-size:15px;font-weight:500;line-height:1.55;color:var(--ink)}
    .quote-src{font-size:10px;font-family:var(--mono);color:var(--l3);margin-top:8px}

    /* small pill (only when urgent) */
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:10px;
      font-family:var(--mono);
      padding:3px 8px;
      border-radius:3px;
      border:1px solid var(--l1);
      color:var(--ink3);
      background:var(--bg);
      white-space:nowrap;
    }
    .pill.urgent{border-color:var(--ink);color:var(--ink);background:var(--paper)}
    .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}

    /* bottom nav */
    .bnav{
      position:fixed;
      bottom:0;left:0;right:0;
      height:60px;
      background:var(--paper);
      border-top:1px solid var(--l1);
      display:flex;
      z-index:300;
    }
    .bn{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:3px;
      cursor:pointer;
      color:var(--l2);
      font-size:9px;
      font-family:var(--mono);
      letter-spacing:.04em;
      text-transform:uppercase;
      transition:color .12s;
      user-select:none;
      position:relative;
    }
    .bn.on{color:var(--ink)}
    .bn.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--ink);border-radius:0 0 2px 2px}
    .bn-ico{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
    .bn-ico svg{width:18px;height:18px;fill:currentColor}

    /* responsive */
    @media (max-width:380px){
      .hero{padding:24px 18px 20px}
      .sec{padding:0 18px}
    }
  </style>
</head>
<body>

  <!-- PAGE: HOME (minimal) -->
  <div class="page active" id="page-home">
    <div class="hero">
      <div class="hero-eyebrow">ZHAOJING · BUSINESS NOTES</div>
      <div class="hero-date" id="heroDate"></div>
    </div>

    <div class="sec">
      <div class="sec-h"><div class="sec-l">每日一句</div><div class="sec-r" id="quoteHint"></div></div>
      <div class="quote">
        <div class="quote-text" id="dailyQuote">載入中…</div>
        <div class="quote-src" id="dailyQuoteSource"></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-h"><div class="sec-l">One Thing</div></div>
      <div class="card">
        <div class="c-bar"></div>
        <div class="c-body">
          <div class="c-title" id="oneThingTitle">（待填）今天最重要的事</div>
          <div class="c-meta" id="oneThingMeta">截止 — · 兆鯨</div>
          <div class="c-desc" id="oneThingDesc">把今天的決定寫成一句話，明天就能直接推進。</div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-h">
        <div class="sec-l">待決策</div>
        <div class="sec-r" id="decisionMore"></div>
      </div>
      <div id="decisionList" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </div>

  <!-- PAGE: LINKS (kept simple; can grow later) -->
  <div class="page" id="page-links">
    <div class="hero">
      <div class="hero-eyebrow">ZHAOJING · LINKS</div>
      <div class="hero-date">入口 / 常用連結</div>
    </div>
    <div class="sec" style="display:flex;flex-direction:column;gap:10px">
      <a class="card" href="./ecom.html" style="text-decoration:none;color:inherit">
        <div class="c-bar"></div>
        <div class="c-body"><div class="c-title">電商</div><div class="c-meta">進度 / 清單</div></div>
      </a>
      <a class="card" href="./property_ops.html" style="text-decoration:none;color:inherit">
        <div class="c-bar"></div>
        <div class="c-body"><div class="c-title">物業管理</div><div class="c-meta">租務 / 代辦</div></div>
      </a>
      <a class="card" href="./tenants.html" style="text-decoration:none;color:inherit">
        <div class="c-bar"></div>
        <div class="c-body"><div class="c-title">房客 / 名單</div><div class="c-meta">資料索引</div></div>
      </a>
    </div>
  </div>

  <!-- bottom nav -->
  <nav class="bnav">
    <div class="bn on" onclick="nav('home',this)">
      <div class="bn-ico"><svg viewBox="0 0 20 20"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg></div>
      首頁
    </div>
    <div class="bn" onclick="nav('links',this)">
      <div class="bn-ico"><svg viewBox="0 0 20 20"><path d="M4 4h5v5H4zM11 4h5v5h-5zM4 11h5v5H4zM11 11h5v5h-5z"/></svg></div>
      入口
    </div>
  </nav>

  <script>
    // ── date
    const days=['日','一','二','三','四','五','六'];
    const n=new Date();
    document.getElementById('heroDate').textContent = `${n.getFullYear()} / ${String(n.getMonth()+1).padStart(2,'0')} / ${String(n.getDate()).padStart(2,'0')}  週${days[n.getDay()]}`;

    // ── nav
    function nav(k,el){
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on'));
      document.getElementById('page-'+k).classList.add('active');
      el.classList.add('on');
      window.scrollTo(0,0);
    }

    // ── state (editable via data/zhaojing_state.json)
    const STATE_URL = '../data/zhaojing_state.json';

    function applyState(state){
      // One Thing
      if(state?.oneThing){
        document.getElementById('oneThingTitle').textContent = state.oneThing.title || '（待填）今天最重要的事';
        document.getElementById('oneThingMeta').textContent = state.oneThing.meta || '截止 — · 兆鯨';
        document.getElementById('oneThingDesc').textContent = state.oneThing.desc || '';
      }

      // Decisions
      const decisions = Array.isArray(state?.decisions) ? state.decisions : [];
      renderDecisions(decisions);
    }

    function renderDecisions(decisions){
      const list = document.getElementById('decisionList');
      const more = document.getElementById('decisionMore');

      const show = decisions.slice(0,3);
      const rest = decisions.length - show.length;

      list.innerHTML = show.map(d => {
        const urgent = !!d.urgent;
        const pill = urgent ? `<span class="pill urgent"><span class="dot"></span>緊急</span>` : '';
        const due = d.due ? `截止 ${d.due}` : '截止 —';
        return `
          <div class="card">
            <div class="c-bar ${urgent ? 'urgent' : ''}"></div>
            <div class="c-body">
              <div class="c-title">${d.title || '（未命名決策）'}</div>
              <div class="c-meta">${due}</div>
            </div>
            ${pill}
          </div>
        `;
      }).join('');

      more.textContent = rest > 0 ? `+${rest} 更多 ›` : '';
    }

    async function loadState(){
      try{
        const res = await fetch(STATE_URL, { cache: 'no-store' });
        if(!res.ok) throw new Error('state fetch failed');
        const state = await res.json();
        applyState(state);
      }catch(e){
        // fallback: render empty but stable UI
        applyState({
          oneThing: { title: '（待填）今天最重要的事', meta: '截止 — · 兆鯨', desc: '' },
          decisions: []
        });
      }
    }

    loadState();

    // ── daily quote (Option B)
    async function loadDailyQuote(){
      const today = new Date().toISOString().slice(0,10);
      const cached = (()=>{ try{return JSON.parse(localStorage.getItem('daily_quote')||'{}')}catch{return {}} })();

      if(cached && cached.date === today && cached.text){
        applyQuote(cached);
        return;
      }

      // Strategy: fetch once per day from public quote API (CORS)
      // Note: This is the display layer only. Archiving to「資訊資料庫」will be done by a separate daily job.
      try{
        const res = await fetch('https://api.quotable.io/random?tags=business|wisdom|famous-quotes');
        const q = await res.json();

        const data = {
          date: today,
          text: q.content,
          source: q.author,
          category: 'business',
          fetched_from: 'api.quotable.io',
          fetched_at: new Date().toISOString()
        };

        localStorage.setItem('daily_quote', JSON.stringify(data));
        applyQuote(data);
        document.getElementById('quoteHint').textContent = '每日更新';
      }catch(e){
        document.getElementById('dailyQuote').textContent = '—';
        document.getElementById('dailyQuoteSource').textContent = '';
        document.getElementById('quoteHint').textContent = '來源不可用';
      }
    }

    function applyQuote(q){
      document.getElementById('dailyQuote').textContent = `「${q.text}」`;
      document.getElementById('dailyQuoteSource').textContent = `— ${q.source || '—'} · ${q.fetched_from || ''}`.trim();
    }

    loadDailyQuote();
  </script>
</body>
</html>
