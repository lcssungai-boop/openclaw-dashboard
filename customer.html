<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Customer Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#eceef1;--panel:#ffffff;--line:#d9dde4;--ink:#17191d;--muted:#626975;--mono:'DM Mono',monospace;--body:'Noto Sans TC',sans-serif;}
    body{font-family:var(--body);color:var(--ink);background:var(--bg);margin:0}
    .phone{max-width:430px;min-height:100vh;margin:0 auto;background:var(--bg)}
    .top{padding:calc(18px + env(safe-area-inset-top)) 18px 12px;position:sticky;top:0;background:rgba(236,238,241,.95);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
    .back{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:#f3f5f8;border-radius:999px;padding:6px 10px;cursor:pointer}
    .name{margin-top:10px;font-size:28px;font-weight:700}
    .sub{margin-top:6px;font-family:var(--mono);font-size:12px;color:var(--muted)}
    .sheet{background:var(--panel);border-radius:22px 22px 0 0;border-top:1px solid #e7ebf2;min-height:calc(100vh - 120px);padding:16px 16px 30px}
    .err{color:#b42318;font-size:14px;line-height:1.6}
    h1{font-size:22px;margin:6px 0 10px}
    h2{font-size:16px;margin:16px 0 8px}
    ul{margin:8px 0 12px 18px;padding:0}
    li{margin:6px 0}
    .meta{font-family:var(--mono);font-size:12px;color:var(--muted)}
    .pill{display:inline-block;margin-left:6px;padding:2px 8px;border:1px solid var(--line);border-radius:999px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="phone">
    <div class="top">
      <button class="back" onclick="history.length>1?history.back():location.href='./index.html'">← 客戶清單</button>
      <div class="name" id="name" style="cursor:pointer" title="回客戶清單">客戶</div>
      <div class="sub" id="meta"></div>
    </div>
    <div class="sheet">
      <div id="content" style="font-size:15px;line-height:1.75;">載入中…</div>
    </div>
  </div>

<script>
  const q = new URLSearchParams(location.search);
  const name = q.get('name') || '';
  const nameEl = document.getElementById('name');
  nameEl.textContent = name || '客戶';
  nameEl.addEventListener('click', ()=> location.href = './index.html#customers');
  document.getElementById('meta').textContent = `更新：${new Date().toLocaleString()}`;

  async function load(){
    if(!name){
      document.getElementById('content').innerHTML = '<div class="err">缺少客戶名稱</div>';
      return;
    }

    const mdUrl = `./data/customers/briefs/${encodeURIComponent(name)}.md?_=${Date.now()}`;

    const esc = (s)=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    function renderLiteMarkdown(md){
      const lines = String(md||'').split(/\r?\n/);
      let html = '';
      let inList = false;
      const closeList = ()=>{ if(inList){ html += '</ul>'; inList=false; } };

      for(const raw of lines){
        const line = raw.trimEnd();
        if(!line.trim()) { closeList(); continue; }

        if(line.startsWith('# ')){
          closeList();
          html += `<h1>${esc(line.slice(2).trim())}</h1>`;
          continue;
        }
        if(line.startsWith('## ')){
          closeList();
          html += `<h2>${esc(line.slice(3).trim())}</h2>`;
          continue;
        }
        if(line.startsWith('- ')){
          if(!inList){ html += '<ul>'; inList=true; }
          html += `<li>${esc(line.slice(2).trim())}</li>`;
          continue;
        }

        closeList();
        html += `<div>${esc(line)}</div>`;
      }
      closeList();
      return html || '<div class="meta">（無內容）</div>';
    }

    try{
      const r = await fetch(mdUrl, {cache:'no-store'});
      if(!r.ok) throw 0;
      const t = await r.text();
      document.getElementById('content').innerHTML = renderLiteMarkdown(t);
    }catch(e){
      document.getElementById('content').innerHTML = '<div class="err">找不到該客戶的一頁總覽（尚未產生或名稱不一致）</div>';
    }
  }
  load();
</script>
</body>
</html>
