<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OpenClaw · Mobile Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--top:#eceef1;--panel:#fff;--line:#d9dde4;--ink:#17191d;--muted:#626975;--mono:'DM Mono',monospace;--body:'Noto Sans TC',sans-serif;--accent:#1f2a44;--warn:#9a6800;--danger:#c0392b;--ok:#1a7a3e}
    body.theme-dark{--top:#121418;--panel:#171a20;--line:#2a313c;--ink:#e9edf5;--muted:#9aa5b5}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:var(--body);color:var(--ink);background:var(--top);overflow-x:hidden}
    .phone{max-width:430px;min-height:100vh;margin:0 auto;background:var(--top)} .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}.carousel::-webkit-scrollbar{display:none}
    .page{min-width:100%;min-height:100vh;scroll-snap-align:start;background:var(--top);position:relative}
    .top{padding:calc(24px + env(safe-area-inset-top)) 18px 64px;position:relative}.theme-toggle{position:absolute;right:14px;top:calc(10px + env(safe-area-inset-top));width:28px;height:28px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink);display:grid;place-items:center;font-size:14px;cursor:pointer}
    .month{font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:.05em}.date{margin-top:22px;font-size:50px;line-height:.95;font-weight:700}.motto{margin-top:14px;font-size:16px;line-height:1.5;font-weight:500;max-width:88%;color:#555c67}
    .sheet{margin-top:-18px;background:var(--panel);border-radius:30px 30px 0 0;border-top:1px solid #e7ebf2;min-height:calc(100vh - 152px);padding:16px 16px 30px}
    .core{border-bottom:1px solid var(--line);padding:14px 0 18px;display:flex;gap:12px;cursor:pointer}.core-bar{width:5px;background:var(--accent);flex-shrink:0}.core-title{font-size:40px;font-weight:700;line-height:1.1}.meta{font-family:var(--mono);font-size:14px;color:var(--muted);margin-top:14px;line-height:1.95}.meta span{display:block}
    .schedule{margin-top:14px}.sch-item,.list-card{padding:12px 0;border-bottom:1px solid var(--line)}.sch-item:last-child,.list-card:last-child{border-bottom:none}.sch-item{display:grid;grid-template-columns:88px 1fr;gap:12px;align-items:start;cursor:pointer}.sch-time{font-family:var(--mono);font-size:13px;color:var(--ink);text-align:right;padding-top:2px}.sch-main{border-left:3px solid #e1e5ec;padding-left:12px}.sch-title{font-size:14px;line-height:1.3;font-weight:700}.sch-sub{font-size:12px;line-height:1.45;color:var(--muted);margin-top:4px;white-space:pre-line}.detail{margin-top:14px;padding-top:10px;border-top:1px solid var(--line)}.detail-text{font-size:15px;line-height:1.7;color:var(--ink);white-space:pre-line}
    .sub-title{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:18px;margin-bottom:10px;letter-spacing:.06em}.pill{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line);margin-right:6px}.pill.warn{color:var(--warn);border-color:var(--warn)}.pill.danger{color:var(--danger);border-color:var(--danger)}.pill.ok{color:var(--ok);border-color:var(--ok)}
    .dept-tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:14px}.dept-tab{flex:1;text-align:center;padding:10px 4px;font-family:var(--mono);font-size:13px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}.dept-tab.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:700}.dept-panel{display:none}.dept-panel.active{display:block}
    .hint{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;font-family:var(--mono);font-size:11px;color:#6c7481;background:rgba(255,255,255,.9);border:1px solid var(--line);padding:4px 10px;border-radius:999px}.home-btn{position:absolute;left:10px;top:10px;border:1px solid #ccd2db;background:#f3f5f8;color:#2a3039;border-radius:999px;padding:4px 10px;font-size:11px;font-family:var(--mono);display:none}
    .page:not(#page-today) .date{font-size:56px}.page:not(#page-today) .motto{font-size:18px;max-width:90%}.page:not(#page-today) .sch-title{font-size:16px}.page:not(#page-today) .sch-sub{font-size:14px}.page:not(#page-today) .sch-time{font-size:14px}
  </style>
</head>
<body>
  <div class="phone"><div class="carousel" id="carousel">
    <section class="page" id="page-today"><div class="top"><button class="theme-toggle" id="themeToggle">☾</button><div class="month" id="monthText"></div><div class="date" id="dateText"></div><div class="motto" id="mottoText"></div></div><div class="sheet"><div class="core" id="coreCard"><div class="core-bar"></div><div><div class="core-title" id="coreTitle">今日重點</div><div class="meta"><span id="coreDate">日期：—</span><span id="coreHint">提醒：—</span></div></div></div><div class="schedule" id="scheduleList"></div><div class="detail"><div class="detail-text" id="detailText">載入中…</div></div></div></section>
    <section class="page" id="page-customers"><div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">客戶</div><div class="motto">SSOT 客戶主檔 + 近期案件補充</div></div><div class="sheet"><div class="sub-title" id="customersSource"></div><div id="customersPane"></div></div></section>
    <section class="page" id="page-tasks"><div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">Tasks</div><div class="motto">未完成待辦、明日後時程、過期提醒</div></div><div class="sheet"><div class="sub-title" id="tasksSource"></div><div id="tasksPane"></div></div></section>
    <section class="page" id="page-exchange"><div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">EXCHANGE</div><div class="motto">三部交流・僅顯示各自 JSON 內容</div></div><div class="sheet"><div class="dept-tabs"><div class="dept-tab active" onclick="switchDept('mgmt',this)">管理部</div><div class="dept-tab" onclick="switchDept('it',this)">資訊部</div><div class="dept-tab" onclick="switchDept('fin',this)">財務部</div></div><div id="deptPanel-mgmt" class="dept-panel active"></div><div id="deptPanel-it" class="dept-panel"></div><div id="deptPanel-fin" class="dept-panel"></div></div></section>
    <section class="page" id="page-control"><div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">CONTROL</div><div class="motto">資料來源角色分工與健康檢查</div></div><div class="sheet"><div class="sub-title" id="controlSource"></div><div id="controlPane"></div></div></section>
    <section class="page" id="page-intel"><div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">INTEL</div><div class="motto">Knowledge index 摘要入口</div></div><div class="sheet"><div class="sub-title" id="intelSource"></div><div id="intelPane"></div></div></section>
    <section class="page" id="page-finance"><div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">FINANCE</div><div class="motto">財務摘要與財務待辦</div></div><div class="sheet"><div class="sub-title" id="financeSource"></div><div id="financePane"></div></div></section>
  </div></div>
  <div class="hint" id="hint">Today · 左右滑動切頁</div>

  <script src="./assets/js/dashboard-data.js"></script>
  <script>
    const PAGE_KEYS=['today','customers','tasks','exchange','control','intel','finance'];
    const MOTTO_POOL=['專業決定高度，細節決定成敗。','成交只是服務的開始，信賴才是企業的複利。','解決問題的能力，決定你在市場的身價。','專注於目標，而非障礙。','用專業贏得尊重，用真誠贏得信任。','凡事有交代，件件有落實，事事有回音。'];
    const carousel=document.getElementById('carousel');
    function dayOfYear(d){const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}
    function setDateAndMotto(){const d=new Date(),mo=['January','February','March','April','May','June','July','August','September','October','November','December'],dy=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];monthText.textContent=`${mo[d.getMonth()]} ${d.getFullYear()}`;dateText.textContent=`${dy[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}`;mottoText.textContent=MOTTO_POOL[dayOfYear(d)%MOTTO_POOL.length]}
    function esc(s){return DashboardData.esc(s)}
    function itemCard(x){return `<div class="list-card"><div class="sch-time">${esc(x.meta||'—')}</div><div class="sch-title">${esc(x.title||'—')}</div>${x.detail?`<div class="sch-sub">${esc(x.detail)}</div>`:''}</div>`}
    function renderCustomers(items){customersPane.innerHTML = items.map(c=>`<a href="./customer.html?name=${encodeURIComponent(c.name)}" style="display:block;color:inherit;text-decoration:none"><div class="list-card"><div style="display:flex;justify-content:space-between;gap:12px"><div><div class="sch-title">${esc(c.name)}</div><div class="sch-sub">${esc(c.role||'—')}</div><div class="sch-sub">最後互動：${esc(c.last_contact||'—')} · ${esc(c.source)}</div></div><div style="font-family:var(--mono);font-size:11px;color:var(--accent)">查看 →</div></div></div></a>`).join('') || itemCard({title:'目前無客戶資料',meta:'—'});
    }
    function renderTasks(data){
      const rows=[];
      if(data.overdue.length){ rows.push(`<div class="sub-title">過期但未完成</div>`); data.overdue.slice(0,5).forEach(t=>rows.push(itemCard({title:t.title,meta:`${t.due||'—'} ${t.time24||''}`.trim(),detail:`${t.category} · ${t.status||'—'} · ${t.source}`}))); }
      rows.push(`<div class="sub-title">接下來待辦 / 時程</div>`); data.futureTasks.slice(0,8).forEach(t=>rows.push(itemCard({title:t.title,meta:`${t.due||'—'} ${t.time24||''}`.trim(),detail:`${t.category} · ${t.status||'—'} · ${t.source}`})));
      tasksPane.innerHTML = rows.join('') || itemCard({title:'目前無待辦',meta:'—'});
    }
    function renderDeptPanel(el, title, updated, rows){ el.innerHTML = `<div class="sub-title">${title}</div>${rows.join('') || itemCard({title:'目前無資料',meta:'—'})}<div class="sub-title">updated_at · ${esc(updated||'—')}</div>`; }
    function switchDept(key, tabEl){document.querySelectorAll('.dept-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.dept-panel').forEach(p=>p.classList.remove('active'));tabEl.classList.add('active');document.getElementById('deptPanel-'+key)?.classList.add('active')}
    function goHome(){carousel.scrollTo({left:0,behavior:'smooth'})}
    function updatePageState(){const idx=Math.round(carousel.scrollLeft/carousel.clientWidth),key=PAGE_KEYS[idx]||'today';document.querySelectorAll('.home-btn').forEach(b=>b.style.display=key==='today'?'none':'inline-block');hint.textContent=`${key.charAt(0).toUpperCase()+key.slice(1)} · 左右滑動切頁`}
    function applyTheme(theme){document.body.classList.toggle('theme-dark', theme==='dark'); themeToggle.textContent = document.body.classList.contains('theme-dark') ? '☀' : '☾'}
    function initTheme(){const saved=localStorage.getItem('oc_theme')||'light';applyTheme(saved);themeToggle.onclick=()=>{const next=document.body.classList.contains('theme-dark')?'light':'dark';localStorage.setItem('oc_theme',next);applyTheme(next)}}

    async function init(){
      setDateAndMotto(); initTheme();
      const data = await DashboardData.load('.');
      customersSource.textContent = data.sourceMap.customers; tasksSource.textContent = data.sourceMap.tasks; controlSource.textContent = data.sourceMap.control; intelSource.textContent = data.sourceMap.intel; financeSource.textContent = data.sourceMap.finance;
      const primary = data.publicState.oneThing || data.todaySchedules[0] || data.futureTasks[0] || {title:'今日重點', desc:'目前無資料'};
      coreTitle.textContent = String(primary.title||'今日重點').slice(0,8); coreDate.textContent = `日期：${DashboardData.to24hLabel(primary.date || primary.time || primary.meta || data.today)}`; coreHint.textContent = `提醒：${(primary.hint || primary.sub || '資料已對齊').slice(0,18)}`; detailText.textContent = primary.desc || primary.detail || '目前無補充說明';
      const timelineItems = data.todaySchedules.length ? data.todaySchedules : data.schedules.slice(0,5);
      scheduleList.innerHTML = timelineItems.map(it=>`<div class="sch-item"><div class="sch-time">${esc(it.time24 || DashboardData.to24hLabel(it.time || '') || (it.due||'—').slice(5))}</div><div class="sch-main"><div class="sch-title">${esc(it.title)}</div><div class="sch-sub">${esc(it.sub || it.detail || it.status || '')}</div></div></div>`).join('') || `<div class="sch-item"><div class="sch-time">今天</div><div class="sch-main"><div class="sch-title">今日無固定時程</div><div class="sch-sub">右滑看待辦與資料狀態</div></div></div>`;
      Array.from(scheduleList.children).forEach((row,idx)=>{ const item=timelineItems[idx]; row.onclick=()=>{ coreTitle.textContent=String(item.title||'今日重點').slice(0,8); coreDate.textContent=`日期：${item.due || item.dateYmd || item.time24 || '—'}`; coreHint.textContent=`提醒：${(item.sub || item.category || item.status || '—').slice(0,18)}`; detailText.textContent=item.detail || item.desc || item.note || '—'; }; });
      renderCustomers(data.customers.slice(0,10)); renderTasks(data);
      renderDeptPanel(document.getElementById('deptPanel-mgmt'),'管理部',data.mgmt.updated_at,[...((data.mgmt.projects||[]).map(p=>itemCard({title:p.name,meta:`${p.status||'—'} · ${p.priority||'-'}`,detail:`${p.client||'—'} · ${p.deadline||'—'}`}))),...((data.mgmt.recent_clients||[]).map(c=>itemCard({title:c.name,meta:c.last_contact||'—',detail:c.category||''})))]);
      renderDeptPanel(document.getElementById('deptPanel-it'),'資訊部',data.it.updated_at,[...Object.entries(data.it.system_status||{}).map(([k,v])=>itemCard({title:k,meta:v,detail:''})),...((data.it.notes||[]).map(n=>itemCard({title:n,meta:'note'})))]);
      renderDeptPanel(document.getElementById('deptPanel-fin'),'財務部',data.fin.updated_at,[...((data.fin.pending_invoices||[]).map(i=>itemCard({title:i.project,meta:i.amount||'—',detail:`${i.client||'—'} · ${i.status||'—'}`}))), itemCard({title:'月度摘要',meta:`收入 ${data.fin.monthly_summary?.income||0} / 支出 ${data.fin.monthly_summary?.expense||0}`,detail:'pending_invoices 為主，finance/tasks.json 為待辦補充'})]);
      controlPane.innerHTML = data.control.map(x=>itemCard({title:`${x.title} · ${x.status}`,meta:x.meta,detail:x.detail})).join('');
      intelPane.innerHTML = data.intel.map(x=>itemCard(x)).join('') || itemCard({title:'knowledge_index 目前無可顯示列',meta:'—'});
      financePane.innerHTML = data.finance.map(x=>itemCard(x)).join('') || itemCard({title:'目前無財務摘要',meta:'—'});
      updatePageState();
    }
    let ticking=false; carousel.addEventListener('scroll',()=>{if(ticking) return; requestAnimationFrame(()=>{updatePageState(); ticking=false}); ticking=true},{passive:true});
    init();
  </script>
</body>
</html>
