<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OpenClaw · Mobile Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --top:#eceef1;
      --panel:#ffffff;
      --line:#d9dde4;
      --ink:#17191d;
      --muted:#626975;
      --mono:'DM Mono',monospace;
      --body:'Noto Sans TC',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--body);color:var(--ink);background:#fff;overflow-x:hidden}

    .phone{max-width:430px;min-height:100vh;margin:0 auto;background:var(--top)}
    .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .carousel::-webkit-scrollbar{display:none}
    .page{min-width:100%;min-height:100vh;scroll-snap-align:start;background:var(--top);position:relative}

    .top{padding:24px 18px 64px;position:relative}
    .month{font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:.05em}
    .date{margin-top:10px;font-size:50px;line-height:.95;font-weight:700;letter-spacing:.005em}
    .motto{margin-top:14px;font-size:16px;line-height:1.5;font-weight:500;max-width:84%;color:#555c67}

    .weather{position:absolute;right:18px;top:20px;border:1px solid #cfd5de;background:var(--top);padding:10px 12px;font-size:12px;color:#1b2029;display:flex;align-items:center;gap:6px}
    .weather .icon{font-size:13px;opacity:.9}

    .sheet{
      margin-top:-18px;
      background:var(--panel);
      border-radius:30px 30px 0 0;
      border-top:1px solid #e7ebf2;
      min-height:calc(100vh - 152px);
      padding:16px 16px 30px;
    }

    .core{
      border-bottom:1px solid var(--line);
      padding:14px 0 18px 0;
      display:flex;gap:12px;
      cursor:pointer;
    }
    .core-bar{width:5px;background:#1f2a44;flex-shrink:0}
    .core-title{font-size:44px;font-weight:700;line-height:1.08;letter-spacing:.01em}
    .meta{font-family:var(--mono);font-size:14px;color:var(--muted);margin-top:10px;display:block;line-height:1.6}
    .meta span{display:block}

    .schedule{margin-top:14px;transition:max-height .25s ease, opacity .2s ease;max-height:460px;overflow:hidden;opacity:1}
    .sch-item{padding:14px 0;cursor:pointer;display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:start}
    .sch-time{font-family:var(--mono);font-size:14px;color:#222;padding-top:2px;text-align:right;padding-right:14px}
    .sch-main{border-left:3px solid #e1e5ec;padding-left:14px}
    .sch-title{font-size:13px;line-height:1.25;margin-top:0;font-weight:700}
    .sch-sub{font-size:13px;line-height:1.35;color:var(--muted);margin-top:3px}

    .detail{margin-top:14px;padding-top:10px;border-top:1px solid var(--line);transition:margin-top .25s ease}
    .detail-text{font-size:14px;line-height:1.6;color:#2b313b}
    .sheet.compact .schedule{max-height:0;opacity:0;margin-top:0}
    .sheet.compact .detail{margin-top:4px}

    .home-btn{
      position:absolute;left:10px;top:10px;
      border:1px solid #ccd2db;background:#f3f5f8;color:#2a3039;
      border-radius:999px;padding:4px 10px;font-size:11px;font-family:var(--mono);
      display:none;
    }

    .sub-title{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:18px;margin-bottom:10px;letter-spacing:.06em}
    .list-card{border-bottom:1px solid var(--line);padding:11px 0}
    .list-card:last-child{border-bottom:none}

    .hint{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;font-family:var(--mono);font-size:11px;color:#6c7481;background:rgba(255,255,255,.9);border:1px solid var(--line);padding:4px 10px;border-radius:999px}
  </style>
</head>
<body>
  <div class="phone">
    <div class="carousel" id="carousel">
      <!-- Today -->
      <section class="page" id="page-today">
        <div class="top">
          <div class="month" id="monthText"></div>
          <div class="date" id="dateText"></div>
          <div class="motto" id="mottoText"></div>
          <div class="weather"><span class="icon" id="wIcon">◌</span><span id="wTemp">--°C</span></div>
        </div>

        <div class="sheet">
          <div class="core" id="coreCard">
            <div class="core-bar"></div>
            <div>
              <div class="core-title" id="coreTitle">完成 Q1 提案</div>
              <div class="meta"><span id="coreDate">日期：03/07</span><span id="coreHint">提醒：先完成關鍵輸出</span></div>
            </div>
          </div>

          <div class="schedule" id="scheduleList"></div>

          <div class="detail">
            <div class="detail-text" id="detailText">本週重點：聚焦可直接交付的成果，優先完成 Q1 提案與關鍵決策，確保週內可核對與可回顧。</div>
          </div>
        </div>
      </section>

      <!-- Tasks -->
      <section class="page" id="page-tasks">
        <div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">TASKS</div><div class="motto">任務分頁（左右滑切換）</div></div>
        <div class="sheet" id="tasksPane"></div>
      </section>

      <!-- Control -->
      <section class="page" id="page-control">
        <div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">CONTROL</div><div class="motto">流程控制與核對</div></div>
        <div class="sheet" id="controlPane"></div>
      </section>

      <!-- Intel -->
      <section class="page" id="page-intel">
        <div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">INTEL</div><div class="motto">資訊資料庫與脈絡</div></div>
        <div class="sheet" id="intelPane"></div>
      </section>

      <!-- Finance -->
      <section class="page" id="page-finance">
        <div class="top"><button class="home-btn" onclick="goHome()">← Home</button><div class="date">FINANCE</div><div class="motto">財務核對與更新</div></div>
        <div class="sheet" id="financePane"></div>
      </section>
    </div>
  </div>
  <div class="hint" id="hint">Today · 左右滑動切頁</div>

  <script>
    const STATE_URL='./data/openclaw_public_state.json';
    const PAGE_KEYS=['today','tasks','control','intel','finance'];

    const MOTTO_POOL=[
      '專業決定高度，細節決定成敗。','成交只是服務的開始，信賴才是企業的複利。','解決問題的能力，決定你在市場的身價。','格局是被委屈撐大的，成功是熬過孤獨留下的。','昨天的成績是底氣，今天的努力是底牌。','一個人可以走很快，一群人才能走很遠。','最好的行銷，是讓客戶感受到你的不可或缺。','不要等機會完美，要讓機會在執行中變得完美。','專注於目標，而非障礙。','領導力不是職位，而是你對他人產生的正向影響。','變革雖然痛苦，但不變革會很危險。','用專業贏得尊重，用真誠贏得信任。','所有的好運，都是努力積攢的實力。','業績是治癒焦慮的良藥，行動是解決問題的鑰匙。','品牌是時間的沉澱，口碑是細節的累積。','與其擔心競爭，不如專注於如何創造價值。','商業的本質是交換，交換的前提是信任。','高手都是在枯燥的基礎上，做到極致的精準。','成功的路上並不擁擠，因為堅持的人不多。','所有的驚艷，都來自於長久的深耕與專業。','只有創造價值的人，才擁有議價的權利。','溝通的目的是達成共識，而非贏得爭論。','把簡單的事做到卓越，就是不簡單。','市場不相信眼淚，只承認結果。','機會從不消失，只是轉移到準備好的人身上。','誠信是商場的通行證，專業是談判的壓艙石。','凡事有交代，件件有落實，事事有回音。','思考決定出路，心態決定勝負。','行為決定習慣，習慣決定性格，性格決定命運。','真正的富有，是褪去光環後依然能溫暖他人。'
    ];

    function dayOfYear(d){const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000)}
    function setDateAndMotto(){
      const d=new Date();
      const enMonth=['January','February','March','April','May','June','July','August','September','October','November','December'];
      const enDay=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      document.getElementById('monthText').textContent=`${enMonth[d.getMonth()]} ${d.getFullYear()}`;
      document.getElementById('dateText').textContent=`${enDay[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}`;
      document.getElementById('mottoText').textContent=`${MOTTO_POOL[dayOfYear(d)%MOTTO_POOL.length]}`;
    }

    function weatherIcon(code){
      if([0].includes(code)) return '☀';
      if([1,2,3].includes(code)) return '⛅';
      if([45,48].includes(code)) return '🌫';
      if([51,53,55,61,63,65,80,81,82].includes(code)) return '🌧';
      if([71,73,75,85,86].includes(code)) return '❄';
      if([95,96,99].includes(code)) return '⛈';
      return '◌';
    }

    async function setWeather(){
      try{
        const getByCoords = async(lat,lon)=>{
          const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=Asia%2FTaipei`;
          const r=await fetch(u);const j=await r.json();
          return {temp:Math.round(j.current.temperature_2m),code:j.current.weather_code};
        };

        let w;
        if(navigator.geolocation){
          w = await new Promise((resolve,reject)=>{
            navigator.geolocation.getCurrentPosition(async p=>{
              try{resolve(await getByCoords(p.coords.latitude,p.coords.longitude));}
              catch(e){reject(e)}
            },reject,{timeout:3500,maximumAge:600000});
          });
        }
        if(!w) w=await getByCoords(23.0,120.2);
        document.getElementById('wTemp').textContent=`${w.temp}°C`;
        document.getElementById('wIcon').textContent=weatherIcon(w.code);
      }catch{
        document.getElementById('wTemp').textContent='--°C';
      }
    }

    function renderLines(el, list){
      el.innerHTML = (list||[]).map(x=>`<div class="list-card"><div class="sch-time">${x.meta||''}</div><div class="sch-title">${x.title||''}</div></div>`).join('') || '<div class="list-card"><div class="sch-time">—</div><div class="sch-title">目前無資料</div></div>';
    }

    async function loadState(){
      let s={};
      try{ const r=await fetch(STATE_URL,{cache:'no-store'}); if(r.ok) s=await r.json(); }catch{}

      const truncate = (txt, n) => {
        const arr = [...String(txt || '')];
        return arr.length > n ? arr.slice(0, n).join('') : arr.join('');
      };

      const pickByOrder = () => {
        const fromFocuses = Array.isArray(s.focuses) ? s.focuses : [];
        const byTag = (tag) => fromFocuses.find(x => String(x.type||x.tag||'').includes(tag));
        return byTag('客戶') || byTag('專案') || byTag('待辦') || fromFocuses[0] || s.oneThing || null;
      };

      const picked = pickByOrder() || {title:'完成 Q1 提案', meta:'03/07', detail:'先完成關鍵輸出'};
      const core = {
        title: truncate(picked.title || picked.item || '今日重點', 7),
        date: truncate((picked.date || picked.due || picked.meta || '03/07').replace(/日期[:：]?/g,''), 12),
        hint: truncate(picked.hint || picked.detail || picked.desc || '先完成關鍵輸出', 15),
        desc: picked.desc || picked.detail || '本週重點：聚焦可直接交付的成果。'
      };

      document.getElementById('coreTitle').textContent = core.title;
      document.getElementById('coreDate').textContent = `日期：${core.date}`;
      document.getElementById('coreHint').textContent = `提醒：${core.hint}`;

      const rawSchedules = s.schedules || [
        {time:'09:00',title:'全立祥送工',sub:'客戶提醒',detail:'全立祥送工: NOVIANTO 諾維 (F260-102)',type:'客戶'},
        {time:'10:00',title:'需求電話說明',sub:'專案提醒',detail:'康揚－正職代招/評點制 需求電話說明（江先生）',type:'專案'},
        {time:'14:00',title:'賴冠佑來訪',sub:'客戶提醒',detail:'賴冠佑 來訪（BNI後）',type:'客戶'}
      ];

      // 只保留客戶 / 專案相關，且以「當日」事件優先
      const now = new Date();
      const mmdd = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
      const pool = rawSchedules.filter(it => String(it.type||it.sub||'').includes('客戶') || String(it.type||it.sub||'').includes('專案'));

      const todayOnly = pool.filter(it => String(it.date||it.meta||'').includes(mmdd));
      const schedules = (todayOnly.length ? todayOnly : pool);

      // 固定「全立祥送工」第一位
      schedules.sort((a,b)=>{
        if(String(a.title||'').includes('全立祥')) return -1;
        if(String(b.title||'').includes('全立祥')) return 1;
        return 0;
      });

      const sheetEl=document.querySelector('#page-today .sheet');
      const schEl=document.getElementById('scheduleList');
      schEl.innerHTML='';
      schedules.forEach(it=>{
        const row=document.createElement('div');
        row.className='sch-item';
        const isQuan = String(it.title||'').includes('全立祥');
        row.innerHTML=`<div class="sch-time">${it.time||''}</div><div class="sch-main"><div class="sch-title" style="font-size:${isQuan ? '15px' : '17px'}">${it.title||''}</div><div class="sch-sub">${it.sub||it.source||''}</div></div>`;
        row.onclick=()=>{
          setDetail(it.detail || it.title || '');
          sheetEl?.classList.add('compact');
        };
        schEl.appendChild(row);
      });

      const weekly = s.weeklyFocus || core.desc || '本週重點：聚焦可直接交付的成果。';
      setDetail(weekly);
      sheetEl?.classList.remove('compact');
      document.getElementById('coreCard').onclick=()=>{
        setDetail(core.desc || weekly);
        sheetEl?.classList.add('compact');
      };

      renderLines(document.getElementById('tasksPane'), s.tasks);
      renderLines(document.getElementById('controlPane'), s.controls);
      renderLines(document.getElementById('intelPane'), s.intels);
      renderLines(document.getElementById('financePane'), s.finances);
    }

    function setDetail(text){ document.getElementById('detailText').textContent = text || ''; }
    document.getElementById('detailText')?.addEventListener('click',()=>{
      document.querySelector('#page-today .sheet')?.classList.remove('compact');
    });

    const carousel=document.getElementById('carousel');
    function goHome(){ carousel.scrollTo({left:0,behavior:'smooth'}); }

    function updatePageState(){
      const idx=Math.round(carousel.scrollLeft / carousel.clientWidth);
      const key=PAGE_KEYS[idx] || 'today';
      document.querySelectorAll('.home-btn').forEach(b=>b.style.display = key==='today' ? 'none' : 'inline-block');
      document.getElementById('hint').textContent = `${key.charAt(0).toUpperCase()+key.slice(1)} · 左右滑動切頁`;
    }

    let ticking=false;
    carousel.addEventListener('scroll',()=>{
      if(ticking) return;
      requestAnimationFrame(()=>{ updatePageState(); ticking=false; });
      ticking=true;
    },{passive:true});

    setDateAndMotto();
    setWeather();
    loadState();
    updatePageState();
  </script>
</body>
</html>
